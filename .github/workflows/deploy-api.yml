name: deploy api

on:
  push:
    branches: [main]
    paths:
      - 'on-seoul-api/**'

jobs:
  build:
    runs-on: ubuntu-latest        # GitHub 호스팅 runner — 빌드 전용
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: ./on-seoul-api

      - name: Build bootJar with Gradle
        run: ./gradlew :app:bootJar -x test
        working-directory: ./on-seoul-api

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./on-seoul-api
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/on-seoul-api:latest
            ghcr.io/${{ github.repository_owner }}/on-seoul-api:${{ github.sha }}

  deploy:
    needs: build
    runs-on: self-hosted          # 서버에 설치된 runner — 배포 전용
    steps:
      - uses: actions/checkout@v4

      - name: Deploy api
        env:
          SHA: ${{ github.sha }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          mkdir -p ~/on-seoul

          # docker-compose.yml은 레포 정본 기준으로 항상 갱신
          cp docker-compose.yml ~/on-seoul/

          # .env.secret 존재 확인 (초기 서버 세팅 필수 — 없으면 배포 중단)
          if [ ! -f ~/on-seoul/.env.secret ]; then
            echo "ERROR: ~/on-seoul/.env.secret not found. Create it before first deployment."
            exit 1
          fi

          cd ~/on-seoul

          # .env: compose 변수만 갱신 (이미지 태그, repo owner)
          touch .env
          sed -i "/^API_TAG=/d" .env
          sed -i "/^GITHUB_REPOSITORY_OWNER=/d" .env
          echo "API_TAG=${SHA}" >> .env
          echo "GITHUB_REPOSITORY_OWNER=${REPO_OWNER,,}" >> .env

          docker compose pull api
          docker compose up -d --no-deps api
          docker image prune -f
