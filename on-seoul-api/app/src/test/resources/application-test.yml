spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  data:
    redis:
      host: localhost
      port: 6379
      password: ""
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-client-id
            client-secret: test-client-secret
            scope: openid,email,profile

jwt:
  # 256-bit key (base64): "test-secret-key-for-junit-tests-this-is-256-bit"
  secret: dGVzdC1zZWNyZXQta2V5LWZvci1qdW5pdC10ZXN0cy10aGlzLWlzLTI1Ni1iaXQ=
  access-token-minutes: 15
  refresh-token-minutes: 10080

seoul:
  api:
    key: test-key
    base-url: http://localhost
    page-size: 200
    max-retries: 1
    max-backoff-seconds: 1
    connect-timeout-ms: 1000
    response-timeout-seconds: 5

kakao:
  api:
    key: test-key
