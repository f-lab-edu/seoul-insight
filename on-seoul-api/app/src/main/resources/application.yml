spring:
  application:
    name: on-seoul-api

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    show-sql: false
    open-in-view: false

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: openid,email,profile

jwt:
  secret: ${JWT_SECRET}
  access-token-minutes: 15
  refresh-token-minutes: 10080

seoul:
  api:
    key: ${SEOUL_OPENAPI_KEY}
    base-url: http://openapi.seoul.go.kr:8088
    page-size: 200
    max-retries: 3
    max-backoff-seconds: 10
    connect-timeout-ms: 10000
    response-timeout-seconds: 30


kakao:
  api:
    key: ${KAKAO_REST_API_KEY}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never