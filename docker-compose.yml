services:
  api:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/on-seoul-api:${API_TAG:-latest}
    container_name: on-seoul-api
    expose:
      - "8080"          # 호스트에 직접 바인딩하지 않음. nginx만 접근
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    env_file:
      - .env.secret     # 민감 정보만 컨테이너로 주입
    depends_on:
      - postgres
      - redis

  agent:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/on-seoul-agent:${AGENT_TAG:-latest}
    container_name: on-seoul-agent
    expose:
      - "8000"
    env_file:
      - .env.secret
    depends_on:
      - redis
      - qdrant

